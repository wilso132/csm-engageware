<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="https://engageware.com/wp-content/uploads/2026/04/Small-Logo-Blue-202x202-1.png" type="image/png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engageware CSM Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --accent: #4f6ef7;
    --accent2: #7c3aed;
    --text: #e8eaf6;
    --muted: #6b7280;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --info: #3b82f6;
  }

  [data-theme="light"] {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --surface2: #eef0f8;
    --border: #d5d9ee;
    --accent: #4f6ef7;
    --accent2: #7c3aed;
    --text: #1a1d2e;
    --muted: #5a6072;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --info: #3b82f6;
  }

  .theme-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    transition: border-color 0.2s;
    margin-right: 8px;
  }
  .theme-toggle:hover { border-color: var(--accent); }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-family: 'IBM Plex Mono', monospace; font-size: 14px; color: var(--accent); letter-spacing: 0.05em; }
  .logo span { color: var(--muted); }
  #auth-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    font-weight: 500;
    transition: opacity 0.15s;
  }
  #auth-btn:hover { opacity: 0.85; }
  #auth-btn.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
  }

  /* ── Main ── */
  main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

  /* ── Auth screen ── */
  #auth-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
    gap: 1rem;
  }
  #auth-screen h2 { font-size: 24px; font-weight: 500; }
  #auth-screen p { color: var(--muted); font-size: 14px; max-width: 380px; line-height: 1.6; }
  #auth-screen .connect-btn {
    margin-top: 1rem;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 15px;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    font-weight: 500;
    transition: opacity 0.15s;
  }
  #auth-screen .connect-btn:hover { opacity: 0.85; }

  /* ── Customer picker ── */
  /* ── Preset filters ── */
  #preset-section {
    margin-bottom: 0;
  }
  .preset-section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .preset-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
  .preset-btn {
    padding: 7px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .preset-btn:hover { border-color: var(--accent); color: var(--accent); }
  .preset-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .preset-btn .preset-spinner {
    width: 10px; height: 10px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  .preset-btn.loading .preset-spinner { display: inline-block; }

  /* ── OR divider row ── */
  .or-divider-row {
    display: flex;
    align-items: center;
    margin: 1.25rem 0 1rem;
  }
  .or-divider-row::before,
  .or-divider-row::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .or-divider-text {
    padding: 0 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── Divider ── */
  .section-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5rem 0;
  }

  /* ── OR separator ── */
  .or-separator {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    flex-shrink: 0;
    align-self: flex-end;
    padding-bottom: 2px;
  }
  .or-separator::before,
  .or-separator::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
    min-width: 16px;
  }

  /* ── Search section ── */
  .search-section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  #picker-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .search-box-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-box-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 5px;
  }

  #customer-search, #org-search {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 15px;
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  #customer-search:focus, #org-search:focus { border-color: var(--accent); }
  #customer-search::placeholder, #org-search::placeholder { color: var(--muted); }

  #customer-dropdown {
    position: relative;
  }
  .dropdown-list {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-height: 280px;
    overflow-y: auto;
    z-index: 200;
    display: none;
  }
  .dropdown-list.open { display: block; }
  .dropdown-item {
    padding: 9px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .dropdown-item:hover, .dropdown-item.selected { background: var(--border); }

  /* ── Customer badge ── */
  #customer-badge {
    display: none;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
  }
  #customer-badge.visible { display: flex; }
  #clear-customer {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0;
  }
  #clear-customer:hover { color: var(--danger); }

  /* ── Bucket tabs ── */
  .bucket-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .tab-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }
  .tab-btn:hover { border-color: var(--accent); color: var(--text); }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tab-btn .count {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    margin-left: 5px;
  }
  .tab-btn:not(.active) .count {
    background: var(--surface2);
    color: var(--muted);
  }

  /* ── Stats row ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-value { font-size: 26px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; }
  .clickable-stat { cursor: pointer; transition: opacity 0.15s; }
  .clickable-stat:hover { opacity: 0.7; }

  /* ── Resolved slider ── */
  .resolved-slider-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .resolved-day-btn {
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
  }
  .resolved-day-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .resolved-day-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }
  .stat-value.danger { color: var(--danger); }
  .stat-value.warning { color: var(--warning); }
  .stat-value.success { color: var(--success); }
  .stat-value.info { color: var(--info); }

  /* ── Issues table ── */
  .issues-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .issues-table th {
    text-align: left;
    padding: 8px 12px;
    color: var(--muted);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 1px solid var(--border);
  }
  .issues-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .issues-table tr:last-child td { border-bottom: none; }
  .issues-table tr:hover td { background: var(--surface2); }

  .issue-key {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    white-space: nowrap;
  }
  .issue-key:hover { text-decoration: underline; }
  .issue-summary { color: var(--text); max-width: 380px; }
  .issue-summary a { color: inherit; text-decoration: none; }
  .issue-summary a:hover { color: var(--accent); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge-todo    { background: #1e293b; color: #94a3b8; }
  .badge-inprog  { background: #1e3a5f; color: #60a5fa; }
  .badge-done    { background: #14532d; color: #4ade80; }
  .badge-other   { background: #3b1f5e; color: #c084fc; }

  [data-theme="light"] .badge-todo   { background: #e2e8f0; color: #475569; }
  [data-theme="light"] .badge-inprog { background: #dbeafe; color: #1d4ed8; }
  [data-theme="light"] .badge-done   { background: #dcfce7; color: #15803d; }
  [data-theme="light"] .badge-other  { background: #f3e8ff; color: #7e22ce; }

  .priority-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 5px;
  }
  .p-highest, .p-blocker { background: #ef4444; }
  .p-high    { background: #f97316; }
  .p-medium  { background: #eab308; }
  .p-low     { background: #3b82f6; }
  .p-lowest  { background: #6b7280; }

  /* ── Table container ── */
  .table-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .table-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .table-title { font-size: 13px; font-weight: 600; }
  .table-meta  { font-size: 12px; color: var(--muted); }
  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--success); color: var(--success); }

  /* ── Last comment toggle ── */
  /* ── Product badges ── */
  .product-badges { display: flex; flex-wrap: wrap; gap: 3px; }
  .prod-badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 500;
    white-space: nowrap;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }
  /* Product filter bar */
  #product-filter-bar {
    display: none;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    padding: 8px 0 0;
    font-size: 12px;
  }
  #product-filter-bar.visible { display: flex; }
  .prod-filter-btn {
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 11px;
    transition: all 0.15s;
  }
  .prod-filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .prod-filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }
  .prod-filter-label { font-size: 11px; color: var(--muted); }

  .comment-toggle-wrap {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--muted);
  }
  .toggle-switch {
    position: relative;
    width: 32px;
    height: 18px;
    flex-shrink: 0;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 18px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-switch input:checked + .toggle-track { background: var(--accent); }
  .toggle-track::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    left: 3px;
    top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle-switch input:checked + .toggle-track::after { transform: translateX(14px); }

  .comment-row td {
    background: var(--surface2);
    padding: 8px 12px 10px 32px;
    font-size: 12px;
    color: var(--text);
    border-bottom: 1px solid var(--border);
  }
  .comment-meta {
    color: var(--muted);
    font-size: 11px;
    margin-bottom: 3px;
  }
  .comment-body {
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .comment-none { color: var(--muted); font-style: italic; }

  /* ── Version footer ── */
  #version-tag {
    display: block;
    text-align: right;
    padding: 16px 16px 8px;
    font-size: 10px;
    color: var(--muted);
    opacity: 0.4;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ── Loading / empty ── */
  .loading, .empty {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-bottom: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Age chip ── */
  .age-chip {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    white-space: nowrap;
  }
  .age-chip.old { color: var(--danger); }
  .age-chip.stale { color: var(--warning); }

  #app { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">engageware<span>/</span>csm</div>
  <div id="header-right">
    <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">🌙</button>
    <button class="theme-toggle" id="lang-toggle" title="Toggle language">EN</button>
    <button id="auth-btn" onclick="startAuth()">Connect to Jira</button>
  </div>
</header>

<main>
  <!-- Auth screen -->
  <div id="auth-screen">
    <h2>CSM Dashboard</h2>
    <p>Connect your Jira account to view live customer data across all projects.</p>
    <button class="connect-btn" onclick="startAuth()">Connect to Jira →</button>
  </div>

  <!-- App (shown after auth) -->
  <div id="app">
    <!-- Preset filters -->
    <div id="preset-section">
      <div class="preset-section-label" data-i18n="preset_filters">Preset Filters</div>
      <div class="preset-buttons">
        <button class="preset-btn" id="preset-t1-all"     onclick="loadPreset('t1-all')">    <span class="preset-spinner"></span>Tier 1 — All Open Tickets</button>
        <button class="preset-btn" id="preset-t1-icp"     onclick="loadPreset('t1-icp')">    <span class="preset-spinner"></span>Tier 1 — ICP (Open)</button>
        <button class="preset-btn" id="preset-t1-nonicp"  onclick="loadPreset('t1-nonicp')"> <span class="preset-spinner"></span>Tier 1 — Non-ICP (Open)</button>
        <button class="preset-btn" id="preset-t2-all"     onclick="loadPreset('t2-all')">    <span class="preset-spinner"></span>Tier 2 — All Open Tickets</button>
        <button class="preset-btn" id="preset-aging-all"  onclick="loadPreset('aging-all')"> <span class="preset-spinner"></span>All Aging (30D+)</button>
        <button class="preset-btn" id="preset-aging-90"   onclick="loadPreset('aging-90')">  <span class="preset-spinner"></span>All Aging (90D+)</button>
      </div>
    </div>

    <!-- Customer / Org search -->
    <div class="or-divider-row">
      <span class="or-divider-text">or search by</span>
    </div>
    <!-- Customer picker -->
    <div id="picker-row">
      <div class="search-box-wrap">
        <div class="search-box-label" data-i18n="label_customer">Customer</div>
        <div id="customer-dropdown" style="position:relative;">
          <input id="customer-search" type="text" placeholder="Loading customers..." autocomplete="off" disabled />
          <div id="customer-dropdown-list" class="dropdown-list"></div>
        </div>
      </div>
      <div class="or-separator">or</div>
      <div class="search-box-wrap">
        <div class="search-box-label" data-i18n="label_organization">Organization</div>
        <div id="org-dropdown" style="position:relative;">
          <input id="org-search" type="text" placeholder="Loading organizations..." autocomplete="off" disabled />
          <div id="org-dropdown-list" class="dropdown-list"></div>
        </div>
      </div>
      <div id="customer-badge">
        <span id="badge-name"></span>
        <button id="clear-customer" onclick="clearCustomer()" title="Clear">×</button>
      </div>
    </div>

    <hr class="section-divider">

    <!-- Stats -->
    <div class="stats-row" id="stats-row" style="display:none;">
      <div class="stat-card">
        <div class="stat-label" data-i18n="open_support">Open Support</div>
        <div class="stat-value info clickable-stat" id="stat-support" onclick="switchTab('support')" title="View support tickets">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label" data-i18n="open_engineering">Open Engineering</div>
        <div class="stat-value info clickable-stat" id="stat-eng" onclick="switchTab('engineering')" title="View engineering tickets">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label" data-i18n="open_ops">Open OPS</div>
        <div class="stat-value info clickable-stat" id="stat-ops" onclick="switchTab('ops')" title="View ops tickets">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Aging (14d+)</div>
        <div class="stat-value danger clickable-stat" id="stat-aging" onclick="switchTab('aging')" title="View tickets">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Resolved (30d)</div>

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const state  = params.get('state');
  if (!code) return false;

  // Clear URL immediately so the code isn't reused
  window.history.replaceState({}, '', window.location.pathname);

  // Show loading state
  document.getElementById('auth-screen').innerHTML = `
    <h2>Connecting to Jira…</h2>
    <p style="color:var(--muted)">Exchanging authorization code for access token.</p>
    <div class="spinner" style="margin:1rem auto;display:block;"></div>`;

  try {
    const r = await fetch(WORKER_TOKEN, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, redirect_uri: REDIRECT_URI }), // sent to WORKER_TOKEN
    });
    const data = await r.json();
    if (data.access_token) {
      accessToken = data.access_token;
      localStorage.setItem('ew_access_token', accessToken);
      if (data.refresh_token) {
        localStorage.setItem('ew_refresh_token', data.refresh_token);
      }
      // Fetch the correct cloud ID for this token
      try {
        await resolveCloudId();
      } catch(cloudErr) {
        document.getElementById('auth-screen').innerHTML = `
          <h2>Site access error</h2>
          <p style="color:var(--danger);margin-bottom:1rem;">${cloudErr.message}</p>
          <p style="color:var(--muted);font-size:13px;margin-bottom:1rem;">
            The OAuth app may not be authorized for the Engageware Jira site yet.
            Try signing in again — on the Atlassian screen, make sure to select the Engageware site.
          </p>
          <button class="connect-btn" onclick="startAuth()">Try again →</button>`;
        return false;
      }
      return true;
    } else {
      throw new Error(data.error_description || 'No access token returned');
    }
  } catch(e) {
    document.getElementById('auth-screen').innerHTML = `
      <h2>Connection failed</h2>
      <p style="color:var(--danger);margin-bottom:1rem;">${e.message}</p>
      <button class="connect-btn" onclick="startAuth()">Try again →</button>`;
    return false;
  }
}

// ── API ───────────────────────────────────────────────────────────────────────
async function jiraFetch(path, params = {}) {
  // Use POST for issue searches to avoid JQL encoding issues
  // Use GET for everything else
  if (path === '/rest/api/3/issue/search') {
    const r = await fetch(WORKER_URL + '/jira/search', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${accessToken}`,
      },
      body: JSON.stringify(params),
    });
    if (!r.ok) {
      const txt = await r.text();
      console.error('[CSM] Search error', r.status, txt.slice(0, 200));
      throw new Error(`Jira API error ${r.status}`);
    }
    return r.json();
  }

  // GET for all other endpoints
  const url = new URL(WORKER_URL + '/jira' + path);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const r = await fetch(url.toString());
  if (!r.ok) {
    const txt = await r.text();
    console.error('[CSM] API error', r.status, path, txt.slice(0, 200));
    throw new Error(`Jira API error ${r.status}`);
  }
  return r.json();
}



async function searchIssues(jql, fields = 'summary,status,priority,issuetype,assignee,updated,created,resolutiondate,comment,customfield_12284,customfield_10100', maxResults = 100) {
  // search/jql uses nextPageToken pagination, not startAt
  const allIssues = [];
  let nextPageToken = null;
  do {
    const params = { jql, fields, maxResults };
    if (nextPageToken) params.nextPageToken = nextPageToken;
    const data = await jiraFetch('/rest/api/3/issue/search', params);
    const issues = data.issues || [];
    allIssues.push(...issues);
    nextPageToken = data.nextPageToken || null;
    if (issues.length < maxResults) break;
  } while (nextPageToken);
  return allIssues;
}

async function loadOrgs() {
  // Check cache first — orgs don't change often
  const CACHE_TTL = 4 * 60 * 60 * 1000; // 4 hours
  const cached = localStorage.getItem('ew_cache_orgs');
  const cachedAt = parseInt(localStorage.getItem('ew_cache_orgs_ts') || '0');
  if (cached && Date.now() - cachedAt < CACHE_TTL) {
    allOrgs = JSON.parse(cached);
    console.log(`[CSM] Loaded ${allOrgs.length} orgs from cache`);
  } else {
    allOrgs = [];
    try {
      let start = 0;
      while (true) {
        const data = await jiraFetch('/rest/servicedeskapi/organization', { limit: 50, start });
        const values = data.values || [];
        values.forEach(o => { if (o.name) allOrgs.push(o.name); });
        if (data.isLastPage || values.length === 0) break;
        start += values.length;
      }
      allOrgs = [...new Set(allOrgs)].sort();
      localStorage.setItem('ew_cache_orgs', JSON.stringify(allOrgs));
      localStorage.setItem('ew_cache_orgs_ts', String(Date.now()));
      console.log(`[CSM] Loaded ${allOrgs.length} orgs from API`);
    } catch(e) {
      console.error('[CSM] Failed to load orgs:', e);
    }
  }
  // Enable org search input
  const orgInput = document.getElementById('org-search');
  if (orgInput) {
    orgInput.disabled = false;
    orgInput.placeholder = t('search_orgs');
  }
}

  localStorage.setItem('ew_org', name);
  localStorage.removeItem('ew_customer');
  updateURL();
  loadAllBuckets();
}

// ── JQL builders ─────────────────────────────────────────────────────────────
function jqlProjects(projects) {
  return '(' + projects.map(p => `"${p}"`).join(', ') + ')';
}

function customerJql(customer) {
  return `${CUSTOMER_FIELD} = "${customer}"`;
}

function orgJql(org) {
  return `cf[11300] = "${org}"`;
}

function makeJql(c, extra) {
  const filter = selectedOrg ? orgJql(selectedOrg) : customerJql(c);
  return filter + (extra ? ' AND ' + extra : '');
}

const BUCKETS = {
  support: c => `project in ${jqlProjects(SUPPORT_PROJECTS)} AND ${makeJql(c)} AND statusCategory != Done ORDER BY priority ASC, created ASC`,
  engineering: c => `project in ${jqlProjects(ENGINEERING_PROJECTS)} AND ${makeJql(c)} AND statusCategory != Done ORDER BY priority ASC, created ASC`,
  ops: c => `project in ${jqlProjects(OPS_PROJECTS)} AND ${makeJql(c)} AND statusCategory != Done ORDER BY priority ASC, created ASC`,
  aging: c => `project in ${jqlProjects([...SUPPORT_PROJECTS,...OPS_PROJECTS])} AND ${makeJql(c)} AND statusCategory != Done AND updated <= "-14d" ORDER BY updated ASC`,
  resolved: c => `project in ${jqlProjects(ALL_PROJECTS)} AND ${makeJql(c)} AND statusCategory = Done AND resolved >= "-365d" ORDER BY resolutiondate DESC`,
  fr: c => `project in ("FR","PRD") AND ${makeJql(c)} ORDER BY statusCategory ASC, priority ASC`,
};

// ── Load data ─────────────────────────────────────────────────────────────────
async function loadAllBuckets() {
  const c = selectedCustomer || selectedOrg;
  const keys = Object.keys(BUCKETS);

  // Reset stats
  keys.forEach(k => {
    const el = document.getElementById(`stat-${k === 'engineering' ? 'eng' : k}`);
    if (el) el.textContent = '…';
  });

  // Load all in parallel
  await Promise.all(keys.map(async key => {
    try {
      const issues = await searchIssues(BUCKETS[key](c));
      issueCache[key] = issues;
      updateCount(key, issues.length);
    } catch(e) {
      issueCache[key] = [];
      updateCount(key, '!');
    }
  }));

  // Update product filter bar now that all buckets are loaded
  updateProductFilterBar(currentTab);

  // Update resolved stat tile to reflect current day filter
  if (issueCache['resolved']) {
    const cutoff = Date.now() - resolvedDays * 86400000;
    const filteredCount = issueCache['resolved'].filter(i => {
      const d = i.fields.resolutiondate || i.fields.updated;
      return d && new Date(d).getTime() >= cutoff;
    }).length;
    const el = document.getElementById('stat-resolved');
    if (el) el.textContent = filteredCount;
    const cnt = document.getElementById('cnt-resolved');
    if (cnt) cnt.textContent = filteredCount;
  }

  renderTab(currentTab);
}

function updateCount(key, count) {
  const statMap = { support:'support', engineering:'eng', ops:'ops', aging:'aging', resolved:'resolved', fr:'fr' };
  const statEl  = document.getElementById(`stat-${statMap[key]}`);
  const cntEl   = document.getElementById(`cnt-${key}`);
  if (statEl) statEl.textContent = count;
  if (cntEl)  cntEl.textContent  = count;
}

// ── Render ────────────────────────────────────────────────────────────────────
function switchTab(tab) {

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const tabEl = document.getElementById('tab-' + tab);
  if (tabEl) tabEl.classList.add('active');

  // Show resolved day buttons only on resolved tab
  const sliderWrap = document.getElementById('resolved-slider-wrap');
  if (sliderWrap) sliderWrap.style.setProperty('display', tab === 'resolved' ? 'flex' : 'none', 'important');
  updateURL();
  renderTab(tab);
}

function updateProductFilterBar(tab) {
  const bar = document.getElementById('product-filter-bar');
  // Gather products from ALL loaded buckets, not just current tab
  const products = new Set();
  Object.values(issueCache).forEach(issues => {
    if (!issues) return;
    issues.forEach(i => {
      (i.fields.customfield_12284 || []).forEach(p => products.add(p.value));
    });
  });
  if (products.size === 0) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  let html = '<span class="prod-filter-label">' + t('filter_by_product') + '</span>';
  html += '<button class="prod-filter-btn' + (activeProductFilter === '' ? ' active' : '') + '" data-product="" data-tab="' + escHtml(tab) + '">' + t('all_products') + '</button>';
  Array.from(products).sort().forEach(p => {
    html += '<button class="prod-filter-btn' + (activeProductFilter === p ? ' active' : '') + '" data-product="' + escHtml(p) + '" data-tab="' + escHtml(tab) + '">' + escHtml(p) + '</button>';
  });
  bar.innerHTML = html;
  bar.querySelectorAll('.prod-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      setProductFilter(btn.getAttribute('data-product'), tab);
    });

}
function setProductFilter(product, tab) {
  activeProductFilter = product;
  localStorage.setItem('ew_product_filter', product);
  sessionStorage.setItem('ew_product_filter', product);
  updateURL();
  renderTab(tab || currentTab);
}

function renderTab(tab) {
  const panel  = document.getElementById('issues-panel');

  }

    panel.innerHTML = `<div class="table-container"><div class="empty">${t('no_issues')}</div></div>`;
    updateProductFilterBar(tab);
    return;
  }

  const TITLES = {
    support:     'Support – Open Tickets',

    ops:         'OPS – Open Tickets',
    aging:       'Aging – No update in 14+ days',
    resolved:    'Resolved – Last 30 days',
    fr:          'Feature Requests',
  };

  // For resolved tab, filter client-side by resolvedDays (we always fetch 365d)
  const resolvedCutoff = tab === 'resolved'
    ? Date.now() - resolvedDays * 86400000
    : null;
  const dayFiltered = resolvedCutoff
    ? issues.filter(i => {
        const d = i.fields.resolutiondate || i.fields.updated;

      })

          <label class="comment-toggle-wrap" title="Show last comment for each ticket">

            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
        </div>
      </div>
      <table class="issues-table">
        <thead>
          <tr>

            <th>Summary</th>
            <th>Status</th>
            <th>Priority</th>
            <th>Assignee</th>

            <th>Created</th>
            <th>Product</th>

  // Wire up copy button after DOM insertion

  if (copyBtn) copyBtn.addEventListener('click', () => copyTable(copyBtn, tab));

function renderRow(issue, tab) {
  const f         = issue.fields;
  const key       = issue.key;
  const summary   = f.summary || '';
  const status    = f.status?.name || '';
  const statusCat = f.status?.statusCategory?.key || '';
  const priority  = f.priority?.name || '';
  const assignee  = f.assignee?.displayName || '—';
  const updated   = f.updated || f.resolutiondate || f.created || '';
  const created   = f.created || '';
  const product   = (f.customfield_12284 || []).map(p => p.value).join(', ');
  const url       = `https://engageware.atlassian.net/browse/${key}`;

  const statusBadge = (() => {
    if (statusCat === 'new')           return `<span class="badge badge-todo">${status}</span>`;
    if (statusCat === 'indeterminate') return `<span class="badge badge-inprog">${status}</span>`;
    if (statusCat === 'done')          return `<span class="badge badge-done">${status}</span>`;
    return `<span class="badge badge-other">${status}</span>`;
  })();

  const prioClass = (() => {
    const p = priority.toLowerCase();
    if (p.includes('highest') || p.includes('blocker')) return 'p-highest';
    if (p.includes('high'))   return 'p-high';
    if (p.includes('medium')) return 'p-medium';
    if (p.includes('low') && !p.includes('lowest')) return 'p-low';
    return 'p-lowest';
  })();

  const ageStr  = updated ? formatAge(updated, tab) : '';

  let commentRow = '';
  if (showComments) {
    const comments = (f.comment && f.comment.comments) ? f.comment.comments : [];
    if (comments.length) {
      const last    = comments[comments.length - 1];
      const author  = (last.author && last.author.displayName) ? last.author.displayName : 'Unknown';
      const dateStr = last.created ? new Date(last.created).toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' }) : '';
      const raw     = extractCommentText(last.body);
      const text    = raw.length > 300 ? raw.slice(0, 297) + '...' : raw;
      commentRow = `<tr class="comment-row"><td colspan="6"><div class="comment-meta">${escHtml(author)} &middot; ${escHtml(dateStr)}</div><div class="comment-body">${escHtml(text)}</div></td></tr>`;
    } else {
      commentRow = `<tr class="comment-row"><td colspan="6"><span class="comment-none">${t('no_comments')}</span></td></tr>`;
    }
  }

  const customers  = (f.customfield_10100 || []).map(c => c.value).join(', ');
  const createdStr = f.created ? new Date(f.created).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
  const productList = (f.customfield_12284 || []).map(p => p.value);

  return `<tr>
    <td><a class="issue-key" href="${url}" target="_blank">${key}</a></td>
    <td class="issue-summary"><a href="${url}" target="_blank">${escHtml(summary)}</a></td>
    <td>${statusBadge}</td>
    <td><span class="priority-dot ${prioClass}"></span>${priority}</td>
    <td style="font-size:12px;color:var(--muted)">${escHtml(assignee)}</td>
    <td>${ageStr}</td>
    ${activePreset ? `<td style="font-size:11px;color:var(--muted)">${escHtml(customers)}</td>` : ''}
    <td style="font-size:11px;color:var(--muted)">${escHtml(createdStr)}</td>
    <td>${productList.length ? `<div class="product-badges">${productList.map(p=>`<span class="prod-badge">${escHtml(p)}</span>`).join('')}</div>` : ''}</td>
  </tr>${commentRow}`;
}

function extractCommentText(body) {
  if (!body) return '';
  if (typeof body === 'string') return body;
  if (body.type === 'doc' && body.content) return body.content.map(extractNodeText).join(' ').replace(/  +/g, ' ').trim();
  return '';
}

function extractNodeText(node) {
  if (!node) return '';
  if (node.type === 'text') return node.text || '';
  if (node.content) return node.content.map(extractNodeText).join(' ');
  return '';
}

function formatAge(dateStr, tab) {
  const d    = new Date(dateStr);
  const days = Math.floor((Date.now() - d) / 86400000);
  const cls  = days >= 30 ? 'old' : days >= 14 ? 'stale' : '';
  const label = tab === 'resolved'
    ? d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })
    : days === 0 ? 'Today' : days === 1 ? '1d ago' : `${days}d ago`;
  return `<span class="age-chip ${cls}">${label}</span>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showAuthScreen() {

  document.getElementById('auth-btn').textContent = 'Connect to Jira';

async function initApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('auth-btn').textContent = t('sign_out');
  document.getElementById('auth-btn').onclick = logout;
  document.getElementById('auth-btn').className = 'secondary';
  // Load both lists in parallel
  await Promise.all([loadCustomers(), loadOrgs()]);
  applyLang();
  // Wire up resolved slider
  // Wire up resolved day buttons
  document.querySelectorAll('.resolved-day-btn').forEach(function(btn) {
    const days = parseInt(btn.getAttribute('data-days'));
    if (days === resolvedDays) btn.classList.add('active');
    else btn.classList.remove('active');
    btn.addEventListener('click', function() {
      resolvedDays = days;
      localStorage.setItem('ew_resolved_days', resolvedDays);
      document.querySelectorAll('.resolved-day-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateURL();
      // Just re-render — client-side filter handles the day window
      if (currentTab === 'resolved') renderTab('resolved');
    });
  });
  restoreFromState();
}

async function init() {
  // If already have a token, just init the app — don't process callback
  if (accessToken) {
    // Don't wipe the URL — let initApp restore it
    await initApp();
    return;
  }

  // Handle OAuth callback only if no token yet
  const params = new URLSearchParams(window.location.search);
  if (params.get('code')) {
    const ok = await handleCallback();
    if (ok) await initApp();
    return;
  }

  showAuthScreen();
}

// ── Copy table ────────────────────────────────────────────────────────────────
function copyTable(btn, tab) {
  // Use same filtering logic as renderTab
  let issues = issueCache[tab] || [];
  if (tab === 'resolved') {
    const cutoff = Date.now() - resolvedDays * 86400000;
    issues = issues.filter(i => {
      const d = i.fields.resolutiondate || i.fields.updated;
      return d && new Date(d).getTime() >= cutoff;
    });
  }
  if (activeProductFilter) {
    issues = issues.filter(i => (i.fields.customfield_12284 || []).some(p => p.value === activeProductFilter));
  }
  if (!issues || !issues.length) return;

  const dateCol = tab === 'resolved' ? 'Resolved' : 'Updated';
  const headers = ['Key', 'Summary', 'Status', 'Priority', 'Assignee', dateCol];
  if (activePreset) headers.push('Customer(s)');
  headers.push('Created', 'Product');
  if (showComments) headers.push('Last Comment Author', 'Last Comment Date', 'Last Comment');

  const rows = issues.map(function(issue) {
    const f = issue.fields;
    const updated = f.updated || f.resolutiondate || f.created || '';
    const date = updated ? new Date(updated).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
    const createdDate = f.created ? new Date(f.created).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
    const productVal  = (f.customfield_12284 || []).map(function(p) { return p.value; }).join(', ');
    var row = [
      issue.key,
      (f.summary || '').split(String.fromCharCode(9)).join(' ').split(String.fromCharCode(10)).join(' '),
      f.status && f.status.name ? f.status.name : '',
      f.priority && f.priority.name ? f.priority.name : '',
      f.assignee && f.assignee.displayName ? f.assignee.displayName : '',
      date,
    ];
    if (activePreset) row.push((f.customfield_10100 || []).map(function(c) { return c.value; }).join(', '));
    row.push(createdDate, productVal);
    if (showComments) {
      const comments = (f.comment && f.comment.comments) ? f.comment.comments : [];
      if (comments.length) {
        const last = comments[comments.length - 1];
        const author = (last.author && last.author.displayName) ? last.author.displayName : '';
        const cDate = last.created ? new Date(last.created).toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' }) : '';
        const text = extractCommentText(last.body).replace(/\s+/g, ' ').trim();
        row.push(author, cDate, text.length > 500 ? text.slice(0, 497) + '...' : text);
      } else {
        row.push('', '', '');
      }
    }
    return row;
  });

  // Build HTML table for PowerPoint/Word/Excel paste
  var htmlTable = '<table><thead><tr>' +
    headers.map(function(h) { return '<th>' + h + '</th>'; }).join('') +
    '</tr></thead><tbody>' +
    rows.map(function(r) {
      return '<tr>' + r.map(function(c) {
        return '<td>' + String(c).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</td>';
      }).join('') + '</tr>';
    }).join('') +
    '</tbody></table>';

  // Write both HTML and plain text to clipboard
  // HTML paste lands as a proper table in PowerPoint, Word, Excel
  var TAB = String.fromCharCode(9);
  var NL  = String.fromCharCode(10);
  var tsv = [headers].concat(rows).map(function(r) { return r.join(TAB); }).join(NL);

  var success = function() {
    btn.classList.add('copied');
    btn.textContent = t('copied');
    setTimeout(function() {
      btn.classList.remove('copied');
      btn.textContent = t('copy');
    }, 2000);
  };

  try {
    var item = new ClipboardItem({
      'text/html':  new Blob([htmlTable], { type: 'text/html' }),
      'text/plain': new Blob([tsv],       { type: 'text/plain' }),
    });
    navigator.clipboard.write([item]).then(success);
  } catch(e) {
    // Fallback for browsers that don't support ClipboardItem
    navigator.clipboard.writeText(tsv).then(success);
  }
}

// ── URL state ─────────────────────────────────────────────────────────────────
function updateURL() {
  const params = new URLSearchParams();
  // customer/org/preset are mutually exclusive — only one in URL at a time
  if (activePreset) {
    params.set('preset', activePreset);
  } else if (selectedCustomer) {
    params.set('customer', selectedCustomer);
  } else if (selectedOrg) {
    params.set('org', selectedOrg);
  }
  if (currentTab && currentTab !== 'support') params.set('tab', currentTab);
  if (resolvedDays !== 30) params.set('resolved_days', resolvedDays);
  if (activeProductFilter) params.set('product', activeProductFilter);
  const qs = params.toString();
  window.history.replaceState({}, '', qs ? `?${qs}` : window.location.pathname);
}



// ── Preset bucket splitting ──────────────────────────────────────────────────
function splitPresetIntoBuckets(issues, presetKey) {
  // Buckets are NOT mutually exclusive — a ticket can appear in multiple buckets.
  // e.g. an aged support ticket appears in both Support AND Aging.
  var agingDays = (presetKey === 'aging-90') ? 90 : 30;

  var open = issues.filter(i => i.fields.status && i.fields.status.statusCategory && i.fields.status.statusCategory.key !== 'done');
  var done = issues.filter(i => i.fields.status && i.fields.status.statusCategory && i.fields.status.statusCategory.key === 'done');

  // Each bucket filters independently from the full issue set
  var support  = open.filter(i => i.fields.project && SUPPORT_PROJECTS.includes(i.fields.project.key));
  var eng      = open.filter(i => i.fields.project && ENGINEERING_PROJECTS.includes(i.fields.project.key));
  var ops      = open.filter(i => i.fields.project && OPS_PROJECTS.includes(i.fields.project.key));
  var aging    = open.filter(i => {
    var upd = i.fields.updated || i.fields.created;
    return upd && (Date.now() - new Date(upd).getTime()) > agingDays * 86400000;
  });
  var resolved = done.filter(i => {
    var d = i.fields.resolutiondate || i.fields.updated;
    return d && (Date.now() - new Date(d).getTime()) <= 365 * 86400000;
  });
  var fr = issues.filter(i => i.fields.project && FR_PROJECTS.includes(i.fields.project.key));

  issueCache['support']     = support;
  issueCache['engineering'] = eng;
  issueCache['ops']         = ops;
  issueCache['aging']       = aging;
  issueCache['resolved']    = resolved;
  issueCache['fr']          = fr;

  updateCount('support',     support.length);
  updateCount('engineering', eng.length);
  updateCount('ops',         ops.length);
  updateCount('aging',       aging.length);
  updateCount('resolved',    resolved.filter(i => {
    var d = i.fields.resolutiondate || i.fields.updated;
    return d && (Date.now() - new Date(d).getTime()) <= resolvedDays * 86400000;
  }).length);
  updateCount('fr',          fr.length);
}

// ── Preset filters ───────────────────────────────────────────────────────────
function getPresetQueries() {
  return {
    't1-all':    'project in ' + jqlProjects(ALL_PROJECTS) + ' AND cf[13703] = "Tier 1" AND statusCategory != Done ORDER BY priority ASC, created ASC',
    't1-icp':    'project in ' + jqlProjects(ALL_PROJECTS) + ' AND cf[13703] = "Tier 1" AND cf[13874] = "Yes" AND statusCategory != Done ORDER BY priority ASC, created ASC',
    't1-nonicp': 'project in ' + jqlProjects(ALL_PROJECTS) + ' AND cf[13703] = "Tier 1" AND cf[13874] = "No" AND statusCategory != Done ORDER BY priority ASC, created ASC',
    't2-all':    'project in ' + jqlProjects(ALL_PROJECTS) + ' AND cf[13703] = "Tier 2" AND statusCategory != Done ORDER BY priority ASC, created ASC',
    'aging-all': 'project in ' + jqlProjects(ALL_PROJECTS) + ' AND statusCategory != Done ORDER BY updated ASC',
    'aging-90':  'project in ' + jqlProjects(ALL_PROJECTS) + ' AND statusCategory != Done ORDER BY updated ASC',
  };
}

async function loadPreset(key) {
  var PRESET_QUERIES = getPresetQueries();
  if (!PRESET_QUERIES[key]) return;

  if (activePreset === key) {
    activePreset = '';
    localStorage.removeItem('ew_preset');
    document.querySelectorAll('.preset-btn').forEach(function(b) { b.classList.remove('active'); });
    clearCustomer();
    updateURL();
    return;
  }

  activePreset = key;
  var loadingKey = key; // capture to detect stale responses
  selectedCustomer = null;
  selectedOrg = null;
  issueCache = {};
  activeProductFilter = '';
  localStorage.setItem('ew_preset', key);
  localStorage.removeItem('ew_customer');
  localStorage.removeItem('ew_org');

  document.querySelectorAll('.preset-btn').forEach(function(b) { b.classList.remove('active', 'loading'); });
  var btn = document.getElementById('preset-' + key);
  if (btn) btn.classList.add('active', 'loading');

  document.getElementById('customer-badge').classList.remove('visible');
  document.getElementById('customer-search').value = '';
  document.getElementById('org-search').value = '';
  document.getElementById('stats-row').style.display = 'grid';
  document.getElementById('bucket-tabs').style.display = 'flex';
  // Reset all counts to loading state
  ['support','engineering','ops','aging','resolved','fr'].forEach(function(k) { updateCount(k, '…'); });
  document.getElementById('issues-panel').innerHTML = '<div class="table-container"><div class="loading"><div class="spinner"></div><br>' + t('loading') + '</div></div>';
  updateURL();

  try {
    var cached = presetCache[key];
    var issues;
    if (cached && Date.now() - cached.ts < PRESET_TTL) {
      issues = cached.issues;
      console.log('[CSM] Preset ' + key + ' from cache (' + issues.length + ')');
    } else {
      // Paginate until all results are fetched
      issues = [];
      var nextPageToken = null;
      var fields = 'summary,status,priority,issuetype,assignee,updated,created,resolutiondate,comment,project,customfield_12284,customfield_10100,customfield_13703,customfield_13874';
      do {
        var params = { jql: PRESET_QUERIES[key], fields: fields, maxResults: 100 };
        if (nextPageToken) params.nextPageToken = nextPageToken;
        var data = await jiraFetch('/rest/api/3/issue/search', params);
        var batch = data.issues || [];
        issues = issues.concat(batch);
        nextPageToken = data.nextPageToken || null;
        if (batch.length < 100) break;
      } while (nextPageToken);
      presetCache[key] = { issues: issues, ts: Date.now() };
      console.log('[CSM] Preset ' + key + ' from API (' + issues.length + ')');
    }
    // Populate each bucket by filtering the full result set
    var open     = issues.filter(i => i.fields.status?.statusCategory?.key !== 'done');
    var done     = issues.filter(i => i.fields.status?.statusCategory?.key === 'done');
    var support  = open.filter(i => ['ASC','SCS','ACSC','TCST','AIC','AMXE'].includes(i.fields.project?.key));
    var eng      = open.filter(i => ENGINEERING_PROJECTS.includes(i.fields.project?.key));
    var ops      = open.filter(i => ['OPS'].includes(i.fields.project?.key));
    var aging    = open.filter(i => {
      const upd = i.fields.updated || i.fields.created;
      return upd && (Date.now() - new Date(upd).getTime()) > 30 * 86400000;
    });
    var resolved = done.filter(i => {
      const d = i.fields.resolutiondate || i.fields.updated;
      return d && (Date.now() - new Date(d).getTime()) <= 365 * 86400000;
    });
    var fr       = issues.filter(i => ['FR','PRD'].includes(i.fields.project?.key));
    issueCache['support']     = support;
    issueCache['engineering'] = eng;
    issueCache['ops']         = ops;
    issueCache['aging']       = aging;
    issueCache['resolved']    = resolved;
    issueCache['fr']          = fr;
    updateCount('support',     support.length);
    updateCount('engineering', eng.length);
    updateCount('ops',         ops.length);
    updateCount('aging',       aging.length);
    updateCount('resolved',    resolved.filter(i => {
      const d = i.fields.resolutiondate || i.fields.updated;
      return d && (Date.now() - new Date(d).getTime()) <= resolvedDays * 86400000;
    }).length);
    updateCount('fr',          fr.length);
    if (btn) btn.classList.remove('loading');
    currentTab = 'support';
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    var supTab = document.getElementById('tab-support');
    if (supTab) supTab.classList.add('active');
    renderTab('support');
  } catch(e) {
    console.error('[CSM] Preset load failed:', e);
    if (btn) btn.classList.remove('active', 'loading');
    activePreset = '';
  }
}

function restoreFromState() {
  const urlCustomer     = sessionStorage.getItem('ew_pending_customer');
  const urlOrg          = sessionStorage.getItem('ew_pending_org');
  const urlTab          = sessionStorage.getItem('ew_pending_tab');
  const urlResolvedDays = sessionStorage.getItem('ew_pending_resolved_days');
  sessionStorage.removeItem('ew_pending_customer');
  sessionStorage.removeItem('ew_pending_org');
  sessionStorage.removeItem('ew_pending_tab');
  sessionStorage.removeItem('ew_pending_resolved_days');

  const urlProduct = sessionStorage.getItem('ew_product_filter');
  if (urlProduct !== null) {
    activeProductFilter = urlProduct;
    localStorage.setItem('ew_product_filter', urlProduct);
  }

  const urlPreset = sessionStorage.getItem('ew_pending_preset') || localStorage.getItem('ew_preset');
  sessionStorage.removeItem('ew_pending_preset');

  if (urlResolvedDays) {
    resolvedDays = parseInt(urlResolvedDays);
    localStorage.setItem('ew_resolved_days', resolvedDays);
    document.querySelectorAll('.resolved-day-btn').forEach(function(btn) {
      const d = parseInt(btn.getAttribute('data-days'));
      btn.classList.toggle('active', d === resolvedDays);
    });
  }

  const savedCustomer = urlCustomer || localStorage.getItem('ew_customer');
  const savedOrg      = urlOrg      || localStorage.getItem('ew_org');
  const savedTab      = urlTab      || localStorage.getItem('ew_tab');

  console.log('[CSM] restoreFromState:', { savedCustomer, savedOrg, savedTab, orgsLen: allOrgs.length, customersLen: allCustomers.length });

  function findMatch(value, list) {
    if (!value) return null;
    const exact = list.find(x => x === value);
    if (exact) return exact;
    const lower = value.toLowerCase();
    return list.find(x => x.toLowerCase().includes(lower)) || null;
  }

  function restoreTab(tab) {
    if (tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      const tabEl = document.getElementById('tab-' + tab);
      if (tabEl) tabEl.classList.add('active');
      const sliderWrap = document.getElementById('resolved-slider-wrap');
      if (sliderWrap) sliderWrap.style.setProperty('display', tab === 'resolved' ? 'flex' : 'none', 'important');
    }
  }

  // Preset takes lowest priority — only if no customer/org
  const matchedOrg      = findMatch(savedOrg, allOrgs);
  const matchedCustomer = findMatch(savedCustomer, allCustomers);

  console.log('[CSM] matched:', { matchedOrg, matchedCustomer, urlPreset });

  if (matchedCustomer) {
    restoreTab(savedTab);
    selectCustomer(matchedCustomer);
  } else if (matchedOrg) {
    restoreTab(savedTab);
    selectOrg(matchedOrg);
  } else if (urlPreset && getPresetQueries()[urlPreset]) {
    loadPreset(urlPreset);
  }
}

init();


// ── Theme toggle ───────────────────────────────────────────────────────────
(function() {
  const btn = document.getElementById('theme-toggle');
  const saved = localStorage.getItem('ew_theme') || 'dark';
  applyTheme(saved);

  btn.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme') || 'dark';
    const next = current === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    localStorage.setItem('ew_theme', next);
  });

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    btn.textContent = theme === 'dark' ? '☀️' : '🌙';
  }
})();
